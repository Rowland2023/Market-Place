server {
    listen 80;
    server_name localhost;

    # 1. FRONTEND: Serve the React build files
    location / {
        root   /usr/share/nginx/html;
        index  index.html index.htm;
        try_files $uri $uri/ /index.html;
    }

    # 2. FASTAPI (Invoice Service)
    # Higher priority: specific path /api/invoices
    location /api/invoices {
        proxy_pass http://invoice_service:8001;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 3. NODE.JS (Employee Service)
    # Higher priority: specific path /api/employees
    location /api/employees {
        proxy_pass http://node_employee:3000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 4. DJANGO (Core Store)
    # Generic /api catch-all
    location /api {
        proxy_pass http://django-backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # 5. DJANGO STATIC ASSETS
    # Serving media/static files from the backend
    location /static {
        proxy_pass http://django-backend:8000/static;
        expires 30d;
        add_header Cache-Control "public, no-transform";
    }

    # ERROR PAGES
    error_page   500 502 503 504  /50x.html;
    location = /50x.html {
        root   /usr/share/nginx/html;
    }
}